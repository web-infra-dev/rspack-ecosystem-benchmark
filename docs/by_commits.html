<!DOCTYPE html>
<html>
	<head>
		<title>Rspack benchmark By Commits</title>
		<link href="./index.css" rel="stylesheet" />
	</head>
	<body>
		<h1>Rspack/benchmark</h1>
		<div class="per-page-container">
			Commits to fetch:
			<input class="per-page-input" type="number" min="1" max="500" step="1" />
			<span class="per-page-apply">Apply</span>
		</div>
		<div class="action-container">
			Add tag by benchmark name and metric:
			<select class="benchmark-name">
				<option>Loading..</option>
			</select>
			<select class="metric">
				<option>Loading..</option>
			</select>
			<span class="add disable">Add</span>
		</div>
		<div class="tag-container">Display benchmark tags:</div>

		<div class="chart-container">
			<canvas id="perf-chart"></canvas>
		</div>

		<h1>Binary Size</h1>
		<div class="size-toggle-container">
			<label class="tag active" data-metric="size"><span class="name">ci size</span></label>
			<label class="tag active" data-metric="releaseSize"><span class="name">release size</span></label>
		</div>
		<div class="chart-container">
			<canvas id="size-chart"></canvas>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.3/dist/chart.umd.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.1/dist/chartjs-adapter-moment.min.js"></script>
		<script src="by_commits.js"></script>
	</body>
</html>
